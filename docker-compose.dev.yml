# Development override: hot reload on code changes, no rebuilds.
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Mounts the source tree into the container and runs `next dev` instead of
# the pre-built standalone server. Code changes reload in <1s.
#
# DO NOT use this in production: dev-mode JS is slower and unminified.

services:
  app:
    image: node:22-alpine
    container_name: kosca_survey
    restart: unless-stopped
    working_dir: /app
    env_file: .env
    environment:
      DB_HOST: kosca_db
      DB_PORT: "5432"
      DB_USER: ${SURVEY_DB_USER:-survey_app}
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      TZ: Asia/Kolkata
    command: >
      sh -c "apk add --no-cache libc6-compat openssl postgresql-client tzdata >/dev/null &&
             cp /usr/share/zoneinfo/Asia/Kolkata /etc/localtime && echo Asia/Kolkata > /etc/timezone &&
             [ -d node_modules/next ] || npm install --no-audit --no-fund &&
             npx prisma generate &&
             until pg_isready -h kosca_db -p 5432 -U $${SURVEY_DB_USER:-survey_app} >/dev/null 2>&1; do echo waiting for db...; sleep 2; done &&
             npx prisma migrate deploy &&
             (npx tsx prisma/seed.ts || true) &&
             npm run dev -- -H 0.0.0.0"
    volumes:
      - ./:/app
      - survey_dev_node_modules:/app/node_modules
      - survey_dev_next:/app/.next
    ports:
      - "3002:3000"
    networks:
      - default
      - kosca_ar_system_default

  cron:
    image: alpine:3.20
    container_name: kosca_survey_cron
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
    depends_on:
      - app
    command: >
      sh -c "apk add --no-cache curl tzdata >/dev/null &&
             cp /usr/share/zoneinfo/Asia/Kolkata /etc/localtime &&
             echo Asia/Kolkata > /etc/timezone &&
             printf '30 9 * * * curl -fsS -m 600 -X POST -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/daily-reminders >> /var/log/cron.log 2>&1\\n' > /etc/crontabs/root &&
             touch /var/log/cron.log &&
             crond -f -l 2 -L /var/log/cron.log &
             tail -F /var/log/cron.log"
    networks:
      - default

  backup:
    image: alpine:3.20
    container_name: kosca_survey_backup
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "30"
    volumes:
      - ./scripts:/scripts:ro
      - survey_backups:/backups
    networks:
      - default
      - kosca_ar_system_default
    command: >
      sh -c "apk add --no-cache postgresql-client tzdata >/dev/null &&
             cp /usr/share/zoneinfo/Asia/Kolkata /etc/localtime &&
             echo Asia/Kolkata > /etc/timezone &&
             printf '0 2 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1\\n' > /etc/crontabs/root &&
             touch /var/log/backup.log &&
             crond -f -l 2 -L /var/log/backup.log &
             tail -F /var/log/backup.log"

volumes:
  survey_dev_node_modules:
  survey_dev_next:
  survey_backups:

networks:
  kosca_ar_system_default:
    external: true
