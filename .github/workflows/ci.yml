name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci_dummy_secret_at_least_32_chars_long_xx
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ci
      SMTP_PASS: ci
      MAIL_FROM: ci@example.com
      CRON_SECRET: ci-cron-secret
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm test -- --run
        if: hashFiles('vitest.config.ts') != ''
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Fail on high/critical, warn on moderate.
      - run: npm audit --audit-level=high
